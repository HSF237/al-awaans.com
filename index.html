<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Awaans — Online Store</title>
  <meta name="description" content="Shop smartphones, smartwatches, tablets and accessories in Abu Dhabi. Al Awaans Online Store." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    /* ── RESET & ROOT ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080808;
      --surface:    #101010;
      --surface-2:  #181818;
      --gold:       #C49A38;
      --gold-light: #D4AA48;
      --gold-dim:   rgba(196,154,56,0.1);
      --gold-border:rgba(196,154,56,0.22);
      --text:       #F0F0F0;
      --text-2:     #888;
      --text-3:     #444;
      --border:     rgba(255,255,255,0.07);
      --radius:     10px;
      --radius-lg:  14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 3px; }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      height: 60px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-2);
      transition: color .2s;
      flex-shrink: 0;
    }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { width: 14px; height: 14px; }

    .nav-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -0.4px;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--gold); }

    .nav-spacer { flex: 1; }

    .nav-search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }
    .nav-search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--text-3);
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 36px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--gold-border); }
    #search::placeholder { color: var(--text-3); }

    .nav-wa {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #25D366;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      transition: opacity .2s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .nav-wa:hover { opacity: 0.88; }
    .nav-wa svg { width: 15px; height: 15px; }

    /* hide text on very small screens */
    @media (max-width: 480px) {
      .nav-wa-text { display: none; }
      .nav-back-text { display: none; }
      .nav-search-wrap { max-width: 160px; }
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .filter-btn.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    .filter-count {
      font-size: 0.68rem;
      background: var(--gold-dim);
      color: var(--gold);
      padding: 1px 6px;
      border-radius: 100px;
      margin-left: 4px;
    }
    .filter-btn.active .filter-count {
      background: rgba(0,0,0,0.2);
      color: #000;
    }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* Section header */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-head h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .section-head span {
      font-size: 0.78rem;
      color: var(--text-3);
    }

    /* ── PRODUCT GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 580px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 860px)  { .grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1100px) { .grid { grid-template-columns: repeat(5, 1fr); } }

    /* ── PRODUCT CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .25s, transform .25s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      border-color: var(--gold-border);
      transform: translateY(-3px);
    }

    .card-img {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--surface-2);
      position: relative;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .45s ease;
    }
    .card:hover .card-img img { transform: scale(1.06); }

    .card-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--gold);
      color: #000;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 4px;
    }

    .card-body {
      padding: 12px 12px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-cat {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
    }
    .card-name {
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }
    .card-btn {
      margin-top: auto;
      padding-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-2);
      transition: color .2s;
    }
    .card:hover .card-btn { color: var(--gold); }
    .card-btn svg { width: 13px; height: 13px; }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
    }
    .empty p { font-size: 0.9rem; margin-top: 8px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn .28s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.93) translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 32px; height: 32px;
      background: var(--surface-2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: color .2s, background .2s;
      z-index: 1;
    }
    .modal-close:hover { color: var(--text); background: var(--border); }
    .modal-close svg { width: 16px; height: 16px; }

    /* Image gallery */
    .modal-gallery {
      position: relative;
      aspect-ratio: 4/3;
      background: var(--surface-2);
      overflow: hidden;
      border-radius: 18px 18px 0 0;
    }
    .modal-gallery img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .modal-gallery img.active { display: block; }

    .gallery-nav {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      pointer-events: none;
    }
    .gallery-btn {
      width: 32px; height: 32px;
      background: rgba(8,8,8,0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      pointer-events: all;
      transition: background .2s;
    }
    .gallery-btn:hover { background: rgba(8,8,8,0.9); }
    .gallery-btn svg { width: 16px; height: 16px; }
    .gallery-btn.hidden { opacity: 0; pointer-events: none; }

    .gallery-dots {
      position: absolute;
      bottom: 10px; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 5px;
    }
    .gallery-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background .2s;
    }
    .gallery-dot.active { background: var(--gold); }

    .modal-body { padding: 20px; }

    .modal-cat {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .modal-title {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .modal-desc {
      font-size: 0.875rem;
      color: var(--text-2);
      line-height: 1.75;
      margin-bottom: 20px;
    }
    .modal-price-note {
      font-size: 0.75rem;
      color: var(--text-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-wa {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25D366;
      color: #fff;
      font-weight: 700;
      font-size: 0.88rem;
      padding: 12px 16px;
      border-radius: var(--radius);
      transition: opacity .2s;
      min-width: 140px;
    }
    .btn-wa:hover { opacity: 0.88; }
    .btn-wa svg { width: 18px; height: 18px; }

    .btn-call {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      font-size: 0.88rem;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color .2s;
    }
    .btn-call:hover { border-color: rgba(255,255,255,0.2); }
    .btn-call svg { width: 16px; height: 16px; }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 32px 20px;
      text-align: center;
    }
    .footer-logo { font-size: 1.1rem; font-weight: 900; margin-bottom: 8px; }
    .footer-logo span { color: var(--gold); }
    .footer-info { font-size: 0.8rem; color: var(--text-3); line-height: 1.8; }
    .footer-info a { color: var(--text-2); transition: color .2s; }
    .footer-info a:hover { color: var(--gold); }
    .footer-copy { font-size: 0.72rem; color: var(--text-3); margin-top: 16px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>

      { id: 21, cat: 'smartwatches', badge: null, name: 'Apple Watch Series 9',    imgs: ['9.webp','applewatchback.webp','applwtchsrs9side-view.jpg'], desc: "Double Tap gesture, S9 chip, always-on Retina display, advanced health sensors including blood oxygen and ECG, and up to 18 hours of battery life." },
      { id: 22, cat: 'smartwatches', badge: null, name: 'Samsung Galaxy Watch 6',  imgs: ['6.webp','galaxywatch6back.webp'],         desc: "Sapphire crystal glass, advanced sleep coaching, body composition analysis, and Google Wear OS 4 with a sleek round design." },

      // TABLETS
      { id: 24, cat: 'tablets', badge: null, name: 'Apple iPad (10th Gen)',        imgs: ['ipad.webp','ipad.jpeg','ipadback.webp'],  desc: "A14 Bionic chip, 10.9″ Liquid Retina display, USB-C, a landscape front camera for FaceTime, and compatibility with Apple Pencil." },
      { id: 25, cat: 'tablets', badge: null, name: 'Redmi Pad Pro 5G',             imgs: ['5g.webp'],                               desc: "5G connectivity, Snapdragon 7s Gen 2, a 12.1″ 144 Hz display, and a 10 000 mAh battery — serious productivity at a great price." },
      { id: 26, cat: 'tablets', badge: null, name: 'Xiaomi Pad 7',                 imgs: ['pad7.webp'],                             desc: "Snapdragon 7+ Gen 3, a 144 Hz 11.2″ display, Dolby Vision, and a large battery built for work and entertainment." },
      { id: 27, cat: 'tablets', badge: null, name: 'Xiaomi Pad 6',                 imgs: ['pad6.webp'],                             desc: "Snapdragon 870, 11″ 144 Hz display, Dolby Vision, and quad speakers — a premium productivity and media tablet." },
      { id: 28, cat: 'tablets', badge: null, name: 'Redmi Pad SE',                 imgs: ['SE.webp','redpadse1.jpg','redpadse2.png'], desc: "Budget-friendly 11″ tablet with a 90 Hz display, Snapdragon 680, 8000 mAh battery, and Dolby Atmos speakers." },
      { id: 29, cat: 'tablets', badge: null, name: 'Redmi Pad',                    imgs: ['redmipad.avif','redmipadback.png'],       desc: "Helio G99, a stunning 10.61″ 90 Hz display, 8000 mAh battery, and quad Dolby Atmos speakers. Great value for any user." },

      // ACCESSORIES
      { id: 30, cat: 'accessories', badge: null, name: 'G-Shock Casio — Model 1', imgs: ['InShot_20250423_100918852.jpg'],          desc: "Unbreakable style meets unstoppable performance. Shock-resistant, water-resistant, and built to endure whatever you throw at it." },
      { id: 31, cat: 'accessories', badge: null, name: 'G-Shock Casio — Model 2', imgs: ['InShot_20250423_100828737.jpg'],          desc: "Classic G-Shock toughness with a bold design. 200 M water resistance, multi-band atomic timekeeping, and solar power." },
      { id: 32, cat: 'accessories', badge: null, name: 'G-Shock Casio — Model 3', imgs: ['InShot_20250423_100848015.jpg'],          desc: "Premium G-Shock with full-auto LED backlight, shock-resistant structure, and world time for 48 cities." },
      { id: 33, cat: 'accessories', badge: null, name: 'G-Shock Casio — Model 4', imgs: ['InShot_20250423_100931622.jpg'],          desc: "Rugged G-Shock built for outdoor adventures. Altimeter, barometer, thermometer, and compass in one tough watch." },
      { id: 34, cat: 'accessories', badge: null, name: 'G-Shock Casio — Model 5', imgs: ['InShot_20250423_100945930.jpg'],          desc: "Limited-edition G-Shock colourway. Signature 200 M water resistance, 5-year battery, and iconic square case." },
    ]

    // ── CATEGORY LABELS ──────────────────────────────────────────
    const CAT_LABEL = {
      smartphones:  'Smartphone',
      smartwatches: 'Smartwatch',
      tablets:      'Tablet',
      accessories:  'Accessory',
    }

    // ── STATE ────────────────────────────────────────────────────
    let PRODUCTS       = []
    let activeCategory = 'all'
    let searchQuery    = ''
    let activeProduct  = null
    let galleryIndex   = 0

    // ── LOAD FROM FIRESTORE ──────────────────────────────────────
    async function loadProducts() {
      renderLoading()
      try {
        // source:'server' bypasses local cache so fresh data always loads
        const snap = await db.collection('products').get({ source: 'server' })
        PRODUCTS = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (a.sortOrder ?? 99) - (b.sortOrder ?? 99))
        if (PRODUCTS.length === 0) throw new Error('empty')
      } catch (err) {
        // Fall back to placeholder if Firestore is unavailable or empty
        PRODUCTS = PRODUCTS_PLACEHOLDER.map(p => ({ ...p, id: String(p.id) }))
      }
      updateCounts()
      render()
    }

    function renderLoading() {
      const grid = document.getElementById('grid')
      grid.innerHTML = Array(8).fill(0).map(() => `
        <div class="card" style="pointer-events:none">
          <div class="card-img" style="background:var(--surface-2);animation:pulse 1.4s ease infinite"></div>
          <div class="card-body">
            <div style="height:10px;width:60%;background:var(--surface-2);border-radius:4px;animation:pulse 1.4s ease infinite"></div>
            <div style="height:14px;width:85%;background:var(--surface-2);border-radius:4px;margin-top:8px;animation:pulse 1.4s ease infinite"></div>
          </div>
        </div>`).join('')
    }

    // ── INIT ─────────────────────────────────────────────────────
    function init() {
      loadProducts()

      document.getElementById('filter-bar').addEventListener('click', e => {
        const btn = e.target.closest('[data-cat]')
        if (!btn) return
        activeCategory = btn.dataset.cat
        searchQuery = ''
        document.getElementById('search').value = ''
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        render()
      })

      document.getElementById('search').addEventListener('input', e => {
        searchQuery = e.target.value.trim().toLowerCase()
        render()
      })

      document.getElementById('modal-close').addEventListener('click', closeModal)
      document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal()
      })
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal()
      })

      document.getElementById('gallery-prev').addEventListener('click', () => setGallery(galleryIndex - 1))
      document.getElementById('gallery-next').addEventListener('click', () => setGallery(galleryIndex + 1))
    }

    // ── UPDATE COUNTS ────────────────────────────────────────────
    function updateCounts() {
      const cats = ['all', 'smartphones', 'smartwatches', 'tablets', 'accessories']
      cats.forEach(cat => {
        const el = document.getElementById('count-' + cat)
        if (!el) return
        el.textContent = cat === 'all'
          ? PRODUCTS.length
          : PRODUCTS.filter(p => p.cat === cat).length
      })
    }

    // ── FILTERED PRODUCTS ────────────────────────────────────────
    function filtered() {
      return PRODUCTS.filter(p => {
        const catMatch = activeCategory === 'all' || p.cat === activeCategory
        const searchMatch = !searchQuery || p.name.toLowerCase().includes(searchQuery)
        return catMatch && searchMatch
      })
    }

    // ── RENDER GRID ──────────────────────────────────────────────
    function render() {
      const list = filtered()
      const grid = document.getElementById('grid')
      const catNames = { all: 'All Products', smartphones: 'Smartphones', smartwatches: 'Smartwatches', tablets: 'Tablets', accessories: 'Accessories' }
      document.getElementById('section-title').textContent = searchQuery
        ? `Search: "${document.getElementById('search').value}"`
        : catNames[activeCategory]
      document.getElementById('result-count').textContent = list.length + ' item' + (list.length !== 1 ? 's' : '')

      if (list.length === 0) {
        grid.innerHTML = `<div class="empty"><p>No products found.</p><p>Try a different search or category.</p></div>`
        return
      }

      grid.innerHTML = list.map(p => `
        <div class="card" onclick="openModal('${p.id}')" role="button" tabindex="0">
          <div class="card-img">
            <img src="${p.imgs && p.imgs[0] ? p.imgs[0] : ''}" alt="${p.name}" loading="lazy" />
            ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
          </div>
          <div class="card-body">
            <span class="card-cat">${CAT_LABEL[p.cat] || p.cat}</span>
            <p class="card-name">${p.name}</p>
            <div class="card-btn">
              View Details
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
          </div>
        </div>
      `).join('')
    }

    // ── MODAL ────────────────────────────────────────────────────
    function openModal(id) {
      const p = PRODUCTS.find(x => String(x.id) === String(id))
      if (!p) return
      activeProduct = p
      galleryIndex  = 0

      document.getElementById('modal-cat').textContent   = CAT_LABEL[p.cat]
      document.getElementById('modal-title').textContent = p.name
      document.getElementById('modal-desc').textContent  = p.desc

      const waText = `Hi, I'm interested in the ${p.name}. Can you give me the price and availability?`
      document.getElementById('modal-wa').href = `https://wa.me/971589892367?text=${encodeURIComponent(waText)}`

      // build gallery
      const gallery = document.getElementById('modal-gallery')
      const oldImgs = gallery.querySelectorAll('img')
      oldImgs.forEach(img => img.remove())

      p.imgs.forEach((src, i) => {
        const img = document.createElement('img')
        img.src = src
        img.alt = p.name
        if (i === 0) img.classList.add('active')
        gallery.insertBefore(img, gallery.querySelector('.gallery-nav'))
      })

      setGallery(0)
      document.getElementById('modal-overlay').classList.add('open')
      document.body.style.overflow = 'hidden'
    }

    function setGallery(idx) {
      if (!activeProduct) return
      const imgs = document.querySelectorAll('#modal-gallery img')
      const n    = imgs.length
      galleryIndex = Math.max(0, Math.min(idx, n - 1))

      imgs.forEach((img, i) => img.classList.toggle('active', i === galleryIndex))

      document.getElementById('gallery-prev').classList.toggle('hidden', galleryIndex === 0)
      document.getElementById('gallery-next').classList.toggle('hidden', galleryIndex >= n - 1)

      // dots
      const dotsEl = document.getElementById('gallery-dots')
      if (n <= 1) { dotsEl.innerHTML = ''; return }
      dotsEl.innerHTML = Array.from({ length: n }, (_, i) =>
        `<span class="gallery-dot${i === galleryIndex ? ' active' : ''}"></span>`
      ).join('')
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open')
      document.body.style.overflow = ''
      activeProduct = null
    }

    // ── START ────────────────────────────────────────────────────
    init()
  </script>
